<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>План следующего занятия — Build your prompt</title>
  <link rel="stylesheet" href="assets/watercolor.css">
  <script src="assets/app.js" defer></script><script src="assets/workflows.js" defer></script><script src="assets/workflow-page.js" defer></script>
</head>
<body data-workflow="next-lesson-planner" data-generator="next-lesson-planner">
