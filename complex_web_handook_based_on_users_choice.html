<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Генератор комплексного web-пособия</title>
  <link rel="stylesheet" href="assets/watercolor.css">
  <script src="assets/app.js" defer></script>
</head>
<body data-generator="web-handbook">
<main class="page-shell">
  <section class="hero"><p class="eyebrow">Многостраничное обучение</p><h1>Комплексное web‑пособие</h1><p>Спроектируйте автономный учебный сайт: главная карта, отдельные разборы, MathML, интерактив и строгий аудит полноты.</p></section>
  <form id="promptForm">
    <section class="form-section">
      <h2><span class="section-number">1</span>Источник и масштаб</h2>
      <div class="form-grid">
        <div class="form-group"><label for="title">Название пособия <span class="badge required">обязательно</span></label><input id="title" name="title" required placeholder="Например: Неравенства и метод интервалов"></div>
        <div class="form-group"><label for="source">Исходный материал</label><input id="source" name="source" value="предоставленное пособие, изображение или набор заданий"></div>
        <div class="form-group"><label for="audience">Аудитория</label><input id="audience" name="audience" value="ученик основной школы"></div>
        <div class="form-group"><label for="mode">Режим выдачи</label><select id="mode" name="mode"><option>внести все файлы в текущий репозиторий</option><option>вывести полный код каждого файла без сокращений</option><option>подготовить архитектуру и один эталонный модуль</option></select></div>
      </div>
      <div class="form-group"><label for="paths">Пути проекта</label><textarea id="paths" name="paths" placeholder="Например: site/index.html, site/topics/*.html, site/assets/"></textarea></div>
    </section>

    <section class="form-section">
      <h2><span class="section-number">2</span>Структура и педагогика</h2>
      <div class="option-grid">
        <label><input type="checkbox" name="blocks" value="полное условие задания" checked>Условие</label>
        <label><input type="checkbox" name="blocks" value="теория и необходимые определения" checked>Теория</label>
        <label><input type="checkbox" name="blocks" value="пошаговое решение с объяснением причин" checked>Разбор</label>
        <label><input type="checkbox" name="blocks" value="визуальная модель или схема, если она помогает" checked>Визуализация</label>
        <label><input type="checkbox" name="blocks" value="типичные ошибки" checked>Ошибки</label>
        <label><input type="checkbox" name="blocks" value="проверка ответа" checked>Проверка</label>
        <label><input type="checkbox" name="blocks" value="похожее упражнение для самопроверки">Самопроверка</label>
        <label><input type="checkbox" name="blocks" value="краткий итог и навигация к соседним темам">Итог</label>
      </div>
      <div class="form-grid" style="margin-top:15px">
        <div class="form-group"><label for="approach">Подход</label><select id="approach" name="approach"><option>от понимания к алгоритму и практике</option><option>problem-based learning</option><option>справочник с быстрым переходом к примерам</option><option>пошаговый тренажёр</option></select></div>
        <div class="form-group"><label for="math">Математика</label><select id="math" name="math"><option>только нативный семантический MathML</option><option>MathML для формул, SVG/canvas для визуализаций</option></select></div>
      </div>
    </section>

    <section class="form-section">
      <h2><span class="section-number">3</span>Архитектура и UX</h2>
      <div class="option-grid">
        <label><input type="checkbox" name="ux" value="единая главная страница-карта всех заданий" checked>Главная карта</label>
        <label><input type="checkbox" name="ux" value="отдельная страница для каждого уникального задания" checked>Страница на задачу</label>
        <label><input type="checkbox" name="ux" value="хлебные крошки и ссылки назад, вперёд и на главную" checked>Навигация</label>
        <label><input type="checkbox" name="ux" value="адаптивность, клавиатурная доступность и aria" checked>Доступность</label>
        <label><input type="checkbox" name="ux" value="полный печатный режим" checked>Печать</label>
        <label><input type="checkbox" name="ux" value="работа локально без CDN, сервера и сборщика" checked>Автономность</label>
        <label><input type="checkbox" name="ux" value="светлая и тёмная темы с сохранением выбора">Две темы</label>
        <label><input type="checkbox" name="ux" value="поиск и фильтрация по темам и сложности">Поиск</label>
      </div>
      <div class="form-grid" style="margin-top:15px">
        <div class="form-group"><label for="design">Дизайн</label><input id="design" name="design" value="единый современный образовательный интерфейс с ясной визуальной иерархией"></div>
        <div class="form-group"><label for="data">Модель данных</label><select id="data" name="data"><option>единый локальный JSON-каталог и отдельные HTML-страницы</option><option>данные встроены в страницы без отдельного JSON</option><option>выбрать минимально достаточный вариант по существующему проекту</option></select></div>
      </div>
      <div class="form-group"><label for="notes">Дополнительные требования</label><textarea id="notes" name="notes" placeholder="Особые типы визуализаций, ограничения репозитория, формат файлов"></textarea></div>
    </section>

    <div class="actions"><button class="btn" type="submit">Сформировать промпт</button><button class="btn secondary" type="button" id="resetBtn">Очистить</button></div>
  </form>
  <section class="output-section" id="outputSection" aria-live="polite"><h2>Готовый промпт</h2><pre class="prompt-output" id="outputText"></pre><div class="actions"><button class="btn" id="copyBtn" type="button">Скопировать</button><button class="btn secondary" id="downloadBtn" type="button">Скачать .txt</button></div><p class="status" id="status"></p></section>
</main>
<script>
document.addEventListener('DOMContentLoaded', () => PromptStudio.bind({
  build(form) {
    const v = name => PromptStudio.value(form, name);
    const c = name => PromptStudio.checked(form, name);
    return `Создай многостраничное автономное web-пособие «${v('title')}» для аудитории «${v('audience')}».

ИСТОЧНИК
${v('source')}.
Перед проектированием извлеки все уникальные задания, темы, определения, примеры, ограничения и ответы. Построй матрицу покрытия и не создавай дублирующиеся страницы для одинаковых заданий.

АРХИТЕКТУРА
- Главная страница должна быть полезной картой пособия, а не простым списком ссылок.
- ${v('data')}.
${c('ux').map(item => `- ${item}.`).join('\n')}
${v('paths') ? `- Используй пути: ${v('paths')}.` : '- Если работа идёт в репозитории, сохрани его соглашения по каталогам и навигации.'}
- Каждая страница посвящена ровно одному уникальному заданию и содержит ссылки на главную и соседние материалы.

СТРУКТУРА СТРАНИЦЫ ЗАДАНИЯ
${c('blocks').map((item, index) => `${index + 1}. ${item}.`).join('\n')}
Подход: ${v('approach')}.

МАТЕМАТИКА
- Формат: ${v('math')}.
- Не используй raw LaTeX, MathJax, KaTeX или текстовые суррогаты формул.
- Вся математика, включая inline-выражения, должна быть валидным и семантически осмысленным MathML.
- Проверь корректность условий, решений, ограничений и ответов независимо от исходника.

ДИЗАЙН И РЕАЛИЗАЦИЯ
- ${v('design')}.
- Запрещены CDN, внешние шрифты, framework'и, интернет-зависимые импорты и серверная часть.
- Не оставляй TODO, FIXME, заглушки и фразы «остальные страницы аналогичны» вместо реализации.
- Общие стили и поведение вынеси в shared assets; контент и состояние не дублируй без необходимости.
- Интерактивные элементы должны корректно работать после повторных действий, смены темы и переходов.

ФИНАЛЬНЫЙ АУДИТ
1. Сверь число уникальных заданий и созданных страниц.
2. Проверь полноту каждой страницы по матрице покрытия.
3. Выполни математическую ревизию и anti-LaTeX аудит.
4. Проверь все ссылки, HTML/CSS/JavaScript, адаптивность, печать и доступность.
5. Убедись, что проект открывается локально без внешней сети.

ВЫДАЧА
${v('mode')}.
Перечисли структуру файлов и выполненные проверки. Не пропускай обязательные файлы и не сокращай код, если выбран полный режим.
${v('notes') ? `\nДОПОЛНИТЕЛЬНЫЕ УКАЗАНИЯ\n${v('notes')}` : ''}`;
  }
}));
</script>
</body>
</html>
