<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Генератор промпта для web-эквивалента</title>
  <link rel="stylesheet" href="assets/watercolor.css">
  <script src="assets/app.js" defer></script>
</head>
<body data-generator="web-equivalent">
<main class="page-shell">
  <section class="hero"><p class="eyebrow">Учебный web‑контент</p><h1>Интерактивный web‑эквивалент</h1><p>Соберите требования к автономной HTML‑странице, которая точно переносит содержание учебного материала.</p></section>
  <form id="promptForm">
    <section class="form-section">
      <h2><span class="section-number">1</span>Материал и назначение</h2>
      <div class="form-grid">
        <div class="form-group"><label for="title">Название занятия <span class="badge required">обязательно</span></label><input id="title" name="title" required placeholder="Например: Метод интервалов"></div>
        <div class="form-group"><label for="audience">Аудитория</label><input id="audience" name="audience" value="ученик 9 класса"></div>
        <div class="form-group"><label for="source">Исходный материал</label><input id="source" name="source" value="предоставленный LaTeX-файл и контекст задачи"></div>
        <div class="form-group"><label for="goal">Главная цель</label><select id="goal" name="goal"><option>полный учебный web-эквивалент без потери содержания</option><option>интерактивный конспект занятия</option><option>тренажёр с упражнениями и ответами</option><option>визуальное объяснение одной сложной темы</option></select></div>
      </div>
      <div class="form-group"><label for="paths">Пути интеграции в репозиторий</label><textarea id="paths" name="paths" placeholder="Например: создать students/.../site/lesson.html и добавить ссылку в index.html"></textarea></div>
    </section>

    <section class="form-section">
      <h2><span class="section-number">2</span>Структура страницы</h2>
      <div class="option-grid">
        <label><input type="checkbox" name="sections" value="краткая теория и определения" checked>Теория</label>
        <label><input type="checkbox" name="sections" value="пошаговый разбор всех примеров" checked>Разборы</label>
        <label><input type="checkbox" name="sections" value="особые случаи и ограничения" checked>Особые случаи</label>
        <label><input type="checkbox" name="sections" value="все упражнения в исходном порядке" checked>Упражнения</label>
        <label><input type="checkbox" name="sections" value="раскрываемый блок ответов" checked>Ответы</label>
        <label><input type="checkbox" name="sections" value="чек-лист самопроверки" checked>Чек-лист</label>
        <label><input type="checkbox" name="sections" value="мини-квиз с обратной связью">Квиз</label>
        <label><input type="checkbox" name="sections" value="интерактивная визуализация">Визуализация</label>
      </div>
      <div class="form-grid" style="margin-top:15px">
        <div class="form-group"><label for="math">Математика</label><select id="math" name="math"><option>семантический MathML без внешних библиотек</option><option>нативный HTML + Unicode для простой математики</option><option>LaTeX-код только внутри редактируемых примеров</option></select></div>
        <div class="form-group"><label for="detail">Подробность</label><select id="detail" name="detail"><option>переключатель: кратко / подробно</option><option>единый подробный режим</option><option>компактный конспект</option></select></div>
      </div>
    </section>

    <section class="form-section">
      <h2><span class="section-number">3</span>UX и технические требования</h2>
      <div class="option-grid">
        <label><input type="checkbox" name="ux" value="адаптивная мобильная компоновка" checked>Адаптивность</label>
        <label><input type="checkbox" name="ux" value="светлая и тёмная темы с сохранением выбора" checked>Две темы</label>
        <label><input type="checkbox" name="ux" value="доступная клавиатурная навигация и aria-атрибуты" checked>Доступность</label>
        <label><input type="checkbox" name="ux" value="полноценный печатный режим" checked>Печать</label>
        <label><input type="checkbox" name="ux" value="работа локально без CDN, сборщика и сервера" checked>Автономность</label>
        <label><input type="checkbox" name="ux" value="скрытие и показ решений или ответов">Управление ответами</label>
      </div>
      <div class="form-grid" style="margin-top:15px">
        <div class="form-group"><label for="design">Дизайн</label><input id="design" name="design" value="современный образовательный интерфейс в стиле существующего сайта"></div>
        <div class="form-group"><label for="delivery">Формат результата</label><select id="delivery" name="delivery"><option>внести файлы в текущий репозиторий</option><option>вывести один полный автономный HTML-файл</option><option>создать многофайловую статическую страницу</option></select></div>
      </div>
      <div class="form-group"><label for="notes">Дополнительные ограничения</label><textarea id="notes" name="notes" placeholder="Точные требования к canvas, вкладкам, данным или дизайну"></textarea></div>
    </section>

    <div class="actions"><button class="btn" type="submit">Сформировать промпт</button><button class="btn secondary" type="button" id="resetBtn">Очистить</button></div>
  </form>
  <section class="output-section" id="outputSection" aria-live="polite"><h2>Готовый промпт</h2><pre class="prompt-output" id="outputText"></pre><div class="actions"><button class="btn" id="copyBtn" type="button">Скопировать</button><button class="btn secondary" id="downloadBtn" type="button">Скачать .txt</button></div><p class="status" id="status"></p></section>
</main>
<script>
document.addEventListener('DOMContentLoaded', () => PromptStudio.bind({
  build(form) {
    const v = name => PromptStudio.value(form, name);
    const c = name => PromptStudio.checked(form, name);
    return `Создай ${v('goal')} по материалу «${v('title')}» для аудитории: ${v('audience')}.

ИСТОЧНИК
${v('source')}

ОБЯЗАТЕЛЬНАЯ СТРУКТУРА
${c('sections').map((item, i) => `${i + 1}. ${item}`).join('\n')}

ТРЕБОВАНИЯ К СОДЕРЖАНИЮ
- Перенеси все определения, формулы, примеры, упражнения, ответы и чек-листы без смысловых потерь.
- Не сокращай сложные объяснения до формальных тезисов: объясняй, почему метод работает.
- Сохрани количество, порядок и уровень сложности упражнений.
- Все ответы перепроверь независимо от источника; найденные ошибки исправь и явно зафиксируй в техническом отчёте, но не показывай служебные детали ученику.
- Математический формат: ${v('math')}.
- Режим подробности: ${v('detail')}.

UX И ТЕХНИКА
${c('ux').map(item => `- ${item}`).join('\n')}
- Дизайн: ${v('design')}.
- JavaScript должен работать без ошибок консоли и не использовать недописанные заглушки.
- Состояния интерактивных элементов должны быть согласованы после переключения темы, вкладки и задания.
- Для динамических визуализаций отдели модель данных от рендеринга и проверяй очистку старого состояния.

ИНТЕГРАЦИЯ И ВЫДАЧА
- Результат: ${v('delivery')}.
${v('paths') ? `- Пути и действия: ${v('paths')}` : '- При наличии репозитория создай отдельную страницу и добавь ссылку в существующую навигацию.'}
- Не изменяй несвязанные материалы.

ПРОВЕРКА ПЕРЕД ЗАВЕРШЕНИЕМ
1. Сверь матрицу покрытия исходника и web-страницы.
2. Проверь синтаксис HTML/CSS/JavaScript.
3. Проверь упражнения, ответы, навигацию, адаптивность, печать и доступность.
4. Если браузерный запуск недоступен, выполни статическую проверку и укажи ограничение.
${v('notes') ? `\nДОПОЛНИТЕЛЬНЫЕ УКАЗАНИЯ\n${v('notes')}` : ''}`;
  }
}));
</script>
</body>
</html>
