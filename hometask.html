<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Генератор домашней и контрольной работы</title>
  <link rel="stylesheet" href="assets/watercolor.css">
  <script src="assets/app.js" defer></script>
</head>
<body data-generator="assessment">
<main class="page-shell">
  <section class="hero"><p class="eyebrow">Диагностика и практика</p><h1>Домашняя или контрольная работа</h1><p>Сформируйте сбалансированный вариант с проверенными задачами, ответами, решениями и критериями оценивания.</p></section>
  <form id="promptForm">
    <section class="form-section">
      <h2><span class="section-number">1</span>Назначение варианта</h2>
      <div class="form-grid">
        <div class="form-group"><label for="subject">Предмет <span class="badge required">обязательно</span></label><input id="subject" name="subject" required value="математика"></div>
        <div class="form-group"><label for="purpose">Тип работы</label><select id="purpose" name="purpose"><option>домашняя работа</option><option>контрольная работа</option><option>диагностический вариант</option><option>вступительное испытание</option><option>тренировочный экзамен</option></select></div>
        <div class="form-group"><label for="classFrom">Текущий уровень</label><input id="classFrom" name="classFrom" value="6 класс"></div>
        <div class="form-group"><label for="classTo">Целевой уровень</label><input id="classTo" name="classTo" value="7 класс"></div>
        <div class="form-group"><label for="institution">Контекст</label><input id="institution" name="institution" placeholder="Лицей, ОГЭ, ЕГЭ, школьная программа"></div>
        <div class="form-group"><label for="time">Время выполнения</label><input id="time" name="time" value="60 минут"></div>
      </div>
    </section>

    <section class="form-section">
      <h2><span class="section-number">2</span>Содержание и сложность</h2>
      <div class="form-grid">
        <div class="form-group"><label for="count">Количество задач</label><input type="number" id="count" name="count" min="1" max="50" value="10"></div>
        <div class="form-group"><label for="difficulty">Общий уровень</label><select id="difficulty" name="difficulty"><option>средний с нарастанием сложности</option><option>базовый</option><option>повышенный</option><option>вступительный в сильный лицей</option><option>олимпиадный</option></select></div>
      </div>
      <div class="form-group"><label for="topics">Обязательные темы <span class="badge required">обязательно</span> <span class="hint">по одной на строку</span></label><textarea id="topics" name="topics" required placeholder="Дроби&#10;Проценты&#10;Линейные уравнения"></textarea></div>
      <div class="option-grid">
        <label><input type="checkbox" name="skills" value="понимание математического текста" checked>Понимание условия</label>
        <label><input type="checkbox" name="skills" value="выбор рационального метода" checked>Выбор метода</label>
        <label><input type="checkbox" name="skills" value="многошаговые рассуждения" checked>Многошаговость</label>
        <label><input type="checkbox" name="skills" value="проверка ограничений и особых случаев" checked>Ограничения</label>
        <label><input type="checkbox" name="skills" value="анализ графиков и схем">Графики</label>
        <label><input type="checkbox" name="skills" value="моделирование текстовых задач">Моделирование</label>
      </div>
    </section>

    <section class="form-section">
      <h2><span class="section-number">3</span>Результат и проверка</h2>
      <div class="option-grid">
        <label><input type="checkbox" name="output" value="ответы отдельным блоком" checked>Ответы</label>
        <label><input type="checkbox" name="output" value="краткие указания">Указания</label>
        <label><input type="checkbox" name="output" value="полные решения">Решения</label>
        <label><input type="checkbox" name="output" value="критерии оценивания" checked>Критерии</label>
        <label><input type="checkbox" name="output" value="разбалловка">Баллы</label>
        <label><input type="checkbox" name="output" value="типичные ошибки">Ошибки</label>
      </div>
      <div class="option-grid" style="margin-top:15px">
        <label><input type="checkbox" name="checks" value="каждая задача решена независимо до выдачи" checked>Решить заранее</label>
        <label><input type="checkbox" name="checks" value="ответы однозначны и соответствуют условиям" checked>Сверить ответы</label>
        <label><input type="checkbox" name="checks" value="вариант сбалансирован по темам и сложности" checked>Баланс</label>
        <label><input type="checkbox" name="checks" value="нет случайно вырожденных и чрезмерно простых задач" checked>Без вырождений</label>
        <label><input type="checkbox" name="checks" value="все ОДЗ и условия существования учтены">ОДЗ</label>
      </div>
      <div class="form-grid" style="margin-top:15px">
        <div class="form-group"><label for="layout">Оформление</label><select id="layout" name="layout"><option>чистый нумерованный вариант</option><option>LaTeX-документ для печати</option><option>таблица заданий и критериев</option><option>HTML-рабочий лист</option></select></div>
        <div class="form-group"><label for="variant">Номер варианта</label><input id="variant" name="variant" value="1"></div>
      </div>
      <div class="form-group"><label for="notes">Дополнительные ограничения</label><textarea id="notes" name="notes" placeholder="Запрещённые темы, требуемые типы задач, особенности ученика"></textarea></div>
    </section>

    <div class="actions"><button class="btn" type="submit">Сформировать промпт</button><button class="btn secondary" type="button" id="resetBtn">Очистить</button></div>
  </form>
  <section class="output-section" id="outputSection" aria-live="polite"><h2>Готовый промпт</h2><pre class="prompt-output" id="outputText"></pre><div class="actions"><button class="btn" id="copyBtn" type="button">Скопировать</button><button class="btn secondary" id="downloadBtn" type="button">Скачать .txt</button></div><p class="status" id="status"></p></section>
</main>
<script>
document.addEventListener('DOMContentLoaded', () => PromptStudio.bind({
  build(form) {
    const v = name => PromptStudio.value(form, name);
    const c = name => PromptStudio.checked(form, name);
    const topics = v('topics').split(/\r?\n|,/).map(item => item.trim()).filter(Boolean);
    return `Ты — опытный преподаватель предмета «${v('subject')}», методист и составитель проверочных материалов.

Составь ${v('purpose')} №${v('variant')} для перехода «${v('classFrom')} → ${v('classTo')}»${v('institution') ? ` в контексте «${v('institution')}»` : ''}.

ПАРАМЕТРЫ
- Количество задач: ${v('count')}.
- Время: ${v('time')}.
- Сложность: ${v('difficulty')}.
- Обязательные темы: ${topics.join(', ')}.

ЧТО ДОЛЖЕН ПРОВЕРЯТЬ ВАРИАНТ
${c('skills').map(item => `- ${item}.`).join('\n')}
- Задачи должны различаться по типу и располагаться в педагогически обоснованном порядке.
- Не используй понятия, выходящие за согласованную программу, если это не требуется явно.
- Формулировки должны быть экзаменационными, однозначными и без лишней воды.

ОБЯЗАТЕЛЬНАЯ ВНУТРЕННЯЯ ПРОВЕРКА
${c('checks').map((item, index) => `${index + 1}. ${item}.`).join('\n')}
- Для параметров, дробей, корней, логарифмов, рациональных выражений и геометрических конфигураций проверь все ограничения.
- В текстовых задачах используй естественную модель и реалистичные данные.
- Не подгоняй ответы после генерации: сначала реши задачи, затем сформируй окончательный вариант.

ФОРМАТ ВЫДАЧИ
- Оформление: ${v('layout')}.
${c('output').length ? c('output').map(item => `- Добавь ${item}.`).join('\n') : '- Выдай только условия задач.'}
- Число ответов, решений и критериев должно соответствовать числу задач.
${v('notes') ? `\nДОПОЛНИТЕЛЬНЫЕ ОГРАНИЧЕНИЯ\n${v('notes')}` : ''}`;
  }
}));
</script>
</body>
</html>
