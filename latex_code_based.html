<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Генератор промпта для LaTeX-пособия</title>
  <link rel="stylesheet" href="assets/watercolor.css">
  <script src="assets/app.js" defer></script>
</head>
<body data-generator="latex-handbook">
<main class="page-shell">
  <section class="hero"><p class="eyebrow">LaTeX publishing</p><h1>Учебное LaTeX‑пособие</h1><p>Соберите требования к математически корректному документу, готовому к компиляции и печати.</p></section>
  <form id="promptForm">
    <section class="form-section">
      <h2><span class="section-number">1</span>Исходные данные</h2>
      <div class="form-grid">
        <div class="form-group"><label for="topic">Тема <span class="badge required">обязательно</span></label><input id="topic" name="topic" required placeholder="Например: квадратные неравенства"></div>
        <div class="form-group"><label for="audience">Уровень</label><input id="audience" name="audience" value="9 класс, подготовка к ОГЭ"></div>
        <div class="form-group"><label for="source">Источник</label><input id="source" name="source" value="предоставленный текст, расшифровка или изображение"></div>
        <div class="form-group"><label for="documentType">Тип документа</label><select id="documentType" name="documentType"><option>полноценное учебное пособие</option><option>рабочий лист без решений</option><option>конспект урока с примерами</option><option>домашняя работа с ответами</option><option>методическая памятка</option></select></div>
      </div>
    </section>

    <section class="form-section">
      <h2><span class="section-number">2</span>Содержание</h2>
      <div class="option-grid">
        <label><input type="checkbox" name="sections" value="цели занятия и краткая навигация" checked>Цели</label>
        <label><input type="checkbox" name="sections" value="теория с определениями и формулами" checked>Теория</label>
        <label><input type="checkbox" name="sections" value="пошагово решённые примеры" checked>Примеры</label>
        <label><input type="checkbox" name="sections" value="особые случаи и ограничения" checked>Особые случаи</label>
        <label><input type="checkbox" name="sections" value="упражнения для самостоятельной работы" checked>Упражнения</label>
        <label><input type="checkbox" name="sections" value="ответы отдельным блоком" checked>Ответы</label>
        <label><input type="checkbox" name="sections" value="типичные ошибки" checked>Ошибки</label>
        <label><input type="checkbox" name="sections" value="итоговый чек-лист">Чек-лист</label>
      </div>
      <div class="form-grid" style="margin-top:15px">
        <div class="form-group"><label for="examples">Примеров на тип задания</label><input type="number" id="examples" name="examples" min="1" max="20" value="3"></div>
        <div class="form-group"><label for="difficulty">Сложность</label><select id="difficulty" name="difficulty"><option>от базовой к повышенной</option><option>базовая</option><option>повышенная</option><option>олимпиадная</option><option>смешанная</option></select></div>
      </div>
    </section>

    <section class="form-section">
      <h2><span class="section-number">3</span>Вёрстка и выдача</h2>
      <div class="form-grid">
        <div class="form-group"><label for="engine">Движок</label><select id="engine" name="engine"><option>pdfLaTeX с T2A и babel</option><option>LuaLaTeX</option><option>XeLaTeX</option></select></div>
        <div class="form-group"><label for="format">Формат страницы</label><select id="format" name="format"><option>A4, поля 18–22 мм</option><option>A5, компактное пособие</option><option>альбомный A4</option></select></div>
        <div class="form-group"><label for="style">Визуальный стиль</label><input id="style" name="style" value="аккуратное современное пособие с мягкими цветными акцентами"></div>
        <div class="form-group"><label for="output">Формат результата</label><select id="output" name="output"><option>только полный LaTeX-код</option><option>создать .tex и скомпилировать PDF в репозитории</option><option>вывести код и краткий отчёт о проверке</option></select></div>
      </div>
      <div class="option-grid">
        <label><input type="checkbox" name="quality" value="все формулы независимо проверены" checked>Проверка формул</label>
        <label><input type="checkbox" name="quality" value="код компилируется без ошибок и предупреждений уровня blocker" checked>Проверка компиляции</label>
        <label><input type="checkbox" name="quality" value="нет переполнений, обрезанных формул и пустых страниц" checked>Проверка макета</label>
        <label><input type="checkbox" name="quality" value="русская типографика и переносы настроены корректно" checked>Русская типографика</label>
        <label><input type="checkbox" name="quality" value="геометрические чертежи строятся средствами TikZ и математически корректны">TikZ</label>
      </div>
      <div class="form-group" style="margin-top:15px"><label for="notes">Дополнительные требования</label><textarea id="notes" name="notes" placeholder="Имена файлов, автор, дата, палитра, нужные пакеты, запрещённые элементы"></textarea></div>
    </section>

    <div class="actions"><button class="btn" type="submit">Сформировать промпт</button><button class="btn secondary" type="button" id="resetBtn">Очистить</button></div>
  </form>
  <section class="output-section" id="outputSection" aria-live="polite"><h2>Готовый промпт</h2><pre class="prompt-output" id="outputText"></pre><div class="actions"><button class="btn" id="copyBtn" type="button">Скопировать</button><button class="btn secondary" id="downloadBtn" type="button">Скачать .txt</button></div><p class="status" id="status"></p></section>
</main>
<script>
document.addEventListener('DOMContentLoaded', () => PromptStudio.bind({
  build(form) {
    const v = name => PromptStudio.value(form, name);
    const c = name => PromptStudio.checked(form, name);
    return `Ты — опытный автор учебных пособий, предметный методист и LaTeX-разработчик.

Создай ${v('documentType')} по теме «${v('topic')}» для уровня «${v('audience')}».
Источник: ${v('source')}.

СОДЕРЖАТЕЛЬНЫЙ КОНТРАКТ
${c('sections').map((item, index) => `${index + 1}. ${item}`).join('\n')}
- На каждый уникальный тип задания подготовь ${v('examples')} примера; сложность: ${v('difficulty')}.
- Не выдумывай темы, которых нет в источнике.
- Сохрани все существенные определения, алгоритмы, ограничения и выводы.
- Примеры и упражнения должны быть решаемыми, непротиворечивыми и иметь проверенные ответы.

ТЕХНИЧЕСКИЙ КОНТРАКТ
- Движок: ${v('engine')}.
- Страница: ${v('format')}.
- Стиль: ${v('style')}.
- Используй только действительно необходимые пакеты; не добавляй несовместимые или неиспользуемые зависимости.
- Определи повторно используемые цвета и tcolorbox-стили централизованно.
- Формулы оформляй семантически корректно; не подменяй математику изображениями.
- Для TikZ-чертежей соблюдай геометрические инварианты и единообразные обозначения.

КОНТРОЛЬ КАЧЕСТВА
${c('quality').map(item => `- ${item}`).join('\n')}
- Проверь соответствие количества упражнений и ответов.
- Устрани overfull/underfull проблемы, если они реально ухудшают макет.
- Не скрывай ошибки компиляции и не оставляй заглушки.

ВЫДАЧА
${v('output')}.
${v('notes') ? `\nДОПОЛНИТЕЛЬНЫЕ ТРЕБОВАНИЯ\n${v('notes')}` : ''}`;
  }
}));
</script>
</body>
</html>
