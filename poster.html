<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Генератор промпта для учебной инфографики</title>
  <link rel="stylesheet" href="assets/watercolor.css">
  <script src="assets/app.js" defer></script>
</head>
<body data-generator="poster">
<main class="page-shell">
  <section class="hero">
    <p class="eyebrow">Образовательный дизайн</p>
    <h1>Учебная инфографика</h1>
    <p>Сформируйте точное задание на визуальную памятку, постер или карточку без противоречивых требований.</p>
  </section>

  <form id="promptForm">
    <section class="form-section">
      <h2><span class="section-number">1</span>Содержание</h2>
      <div class="form-grid">
        <div class="form-group"><label for="topic">Тема <span class="badge required">обязательно</span></label><input id="topic" name="topic" required placeholder="Например: метод интервалов"></div>
        <div class="form-group"><label for="audience">Аудитория</label><input id="audience" name="audience" value="ученик 9 класса" placeholder="Класс, уровень, особенности"></div>
        <div class="form-group"><label for="purpose">Цель</label><select id="purpose" name="purpose"><option>объяснить ключевую идею</option><option>дать алгоритм решения</option><option>собрать формулы и свойства</option><option>предупредить типичные ошибки</option><option>подготовить чек-лист самопроверки</option></select></div>
        <div class="form-group"><label for="source">Источник содержания</label><input id="source" name="source" placeholder="Контекст чата, файл, расшифровка, изображение"></div>
      </div>
      <div class="form-group">
        <label>Обязательные блоки</label>
        <div class="option-grid">
          <label><input type="checkbox" name="blocks" value="краткое определение" checked>Определение</label>
          <label><input type="checkbox" name="blocks" value="пошаговый алгоритм" checked>Алгоритм</label>
          <label><input type="checkbox" name="blocks" value="один корректный пример" checked>Пример</label>
          <label><input type="checkbox" name="blocks" value="типичные ошибки" checked>Ошибки</label>
          <label><input type="checkbox" name="blocks" value="мини-чек-лист">Чек-лист</label>
          <label><input type="checkbox" name="blocks" value="формулы и обозначения">Формулы</label>
        </div>
      </div>
    </section>

    <section class="form-section">
      <h2><span class="section-number">2</span>Визуальный язык</h2>
      <div class="form-grid">
        <div class="form-group"><label for="style">Стиль</label><select id="style" name="style"><option>акварельная учебная памятка</option><option>минималистичная академическая инфографика</option><option>дружелюбный hand-drawn конспект</option><option>строгий научный постер</option></select></div>
        <div class="form-group"><label for="palette">Палитра</label><input id="palette" name="palette" value="молочный фон, приглушённые голубые, зелёные и терракотовые акценты"></div>
        <div class="form-group"><label for="aspect">Формат</label><select id="aspect" name="aspect"><option>вертикальный 4:5</option><option>вертикальный A4</option><option>квадратный 1:1</option><option>горизонтальный 16:9</option></select></div>
        <div class="form-group"><label for="geometry">Чертежи и схемы</label><select id="geometry" name="geometry"><option>использовать только если помогают пониманию</option><option>обязательна одна корректная схема</option><option>не использовать геометрические чертежи</option></select></div>
      </div>
      <div class="form-group"><label for="signature">Подпись внизу</label><input id="signature" name="signature" placeholder="Например: Артём Лёвин — специально для ученика"></div>
    </section>

    <section class="form-section">
      <h2><span class="section-number">3</span>Ограничения качества</h2>
      <div class="option-grid">
        <label><input type="checkbox" name="quality" value="весь текст на русском языке и полностью читаем" checked>Читаемый русский текст</label>
        <label><input type="checkbox" name="quality" value="все формулы и утверждения математически корректны" checked>Математическая точность</label>
        <label><input type="checkbox" name="quality" value="не добавлять факты и темы, которых нет в источнике" checked>Без выдуманных тем</label>
        <label><input type="checkbox" name="quality" value="геометрические построения непротиворечивы и корректно размечены" checked>Корректные чертежи</label>
        <label><input type="checkbox" name="quality" value="декор не мешает чтению и не содержит случайных символов" checked>Сдержанный декор</label>
      </div>
      <div class="form-group" style="margin-top:15px"><label for="notes">Дополнительные указания</label><textarea id="notes" name="notes" placeholder="Что особенно важно показать или запретить"></textarea></div>
    </section>

    <div class="actions">
      <button class="btn" type="submit">✨ Сформировать промпт</button>
      <button class="btn secondary" type="button" id="resetBtn">Очистить</button>
    </div>
  </form>

  <section class="output-section" id="outputSection" aria-live="polite">
    <h2>Готовый промпт</h2>
    <pre class="prompt-output" id="outputText"></pre>
    <div class="actions"><button class="btn" id="copyBtn" type="button">Скопировать</button><button class="btn secondary" id="downloadBtn" type="button">Скачать .txt</button></div>
    <p class="status" id="status"></p>
  </section>
</main>
<script>
document.addEventListener('DOMContentLoaded', () => PromptStudio.bind({
  build(form) {
    const v = name => PromptStudio.value(form, name);
    const c = name => PromptStudio.checked(form, name);
    return `Ты — опытный образовательный дизайнер и предметный методист.

Создай ${v('aspect')} в формате «${v('style')}» по теме «${v('topic')}».

КОНТЕКСТ
- Аудитория: ${v('audience')}
- Цель: ${v('purpose')}
- Источник содержания: ${v('source') || 'используй предоставленный пользователем контекст'}
- Палитра: ${v('palette')}
- Чертежи и схемы: ${v('geometry')}

ОБЯЗАТЕЛЬНАЯ СТРУКТУРА
${c('blocks').map(item => `- ${item}`).join('\n') || '- выбери минимально достаточную структуру'}

ТРЕБОВАНИЯ К КАЧЕСТВУ
${c('quality').map(item => `- ${item}`).join('\n')}
- Сохрани ясную визуальную иерархию: заголовок → ключевые блоки → вывод.
- Формулы записывай единообразно, без искажений индексов, степеней, дробей и знаков.
- Если схема не повышает понимание, не добавляй её ради декора.
${v('signature') ? `- Размести внизу читаемую подпись: «${v('signature')}».` : ''}
${v('notes') ? `\nДОПОЛНИТЕЛЬНЫЕ УКАЗАНИЯ\n${v('notes')}` : ''}

Перед созданием изображения проверь полноту содержания, математическую корректность, читаемость русского текста и непротиворечивость всех схем.`;
  }
}));
</script>
</body>
</html>
