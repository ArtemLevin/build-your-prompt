<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Генератор набора упражнений</title>
  <link rel="stylesheet" href="assets/watercolor.css">
  <script src="assets/app.js" defer></script>
</head>
<body data-generator="exercises">
<main class="page-shell">
  <section class="hero"><p class="eyebrow">Практика и контроль</p><h1>Набор упражнений</h1><p>Настройте предмет, темы, градацию сложности, формат выдачи и требования к проверке.</p></section>
  <form id="promptForm">
    <section class="form-section">
      <h2><span class="section-number">1</span>Параметры набора</h2>
      <div class="form-grid">
        <div class="form-group"><label for="subject">Предмет <span class="badge required">обязательно</span></label><input id="subject" name="subject" required value="математика"></div>
        <div class="form-group"><label for="grade">Класс или уровень</label><input id="grade" name="grade" value="9 класс, ОГЭ"></div>
        <div class="form-group"><label for="topic">Общая тема <span class="badge required">обязательно</span></label><input id="topic" name="topic" required placeholder="Например: квадратные уравнения"></div>
        <div class="form-group"><label for="count">Количество на каждую подтему</label><input type="number" id="count" name="count" min="1" max="50" value="5"></div>
      </div>
      <div class="form-group"><label for="subtopics">Подтемы <span class="hint">по одной на строку</span></label><textarea id="subtopics" name="subtopics" placeholder="Разложение на множители&#10;Дискриминант&#10;Теорема Виета"></textarea></div>
    </section>

    <section class="form-section">
      <h2><span class="section-number">2</span>Сложность и содержание</h2>
      <div class="form-grid">
        <div class="form-group"><label for="level">Уровень</label><select id="level" name="level"><option>смешанный: базовый → повышенный</option><option>базовый</option><option>повышенный</option><option>олимпиадный</option></select></div>
        <div class="form-group"><label for="distribution">Распределение</label><select id="distribution" name="distribution"><option>с нарастающей сложностью</option><option>равномерно по уровням</option><option>случайный порядок после проверки</option><option>все задачи одного уровня</option></select></div>
      </div>
      <div class="option-grid">
        <label><input type="checkbox" name="requirements" value="разные типы условий и сюжеты" checked>Разнообразие</label>
        <label><input type="checkbox" name="requirements" value="однозначные проверенные ответы" checked>Однозначность</label>
        <label><input type="checkbox" name="requirements" value="соответствие школьной программе указанного уровня" checked>По программе</label>
        <label><input type="checkbox" name="requirements" value="реалистичные данные и единицы измерения" checked>Реалистичность</label>
        <label><input type="checkbox" name="requirements" value="красивые или педагогически осмысленные числовые ответы">Удобные ответы</label>
        <label><input type="checkbox" name="requirements" value="отсутствие дублирующихся задач">Без повторов</label>
      </div>
    </section>

    <section class="form-section">
      <h2><span class="section-number">3</span>Выдача</h2>
      <div class="form-grid">
        <div class="form-group"><label for="layout">Формат задач</label><select id="layout" name="layout"><option>нумерованный список</option><option>группировка по подтемам</option><option>таблица: номер, подтема, условие</option><option>LaTeX-код рабочего листа</option></select></div>
        <div class="form-group"><label for="answers">Ответы и решения</label><select id="answers" name="answers"><option>ответы отдельным блоком без решений</option><option>без ответов и решений</option><option>краткие указания и ответы</option><option>полные решения и ответы</option></select></div>
        <div class="form-group"><label for="language">Язык</label><input id="language" name="language" value="русский"></div>
        <div class="form-group"><label for="formatting">Оформление</label><input id="formatting" name="formatting" value="чёткие условия, корректные обозначения и единицы измерения"></div>
      </div>
      <div class="form-group"><label for="notes">Дополнительные указания</label><textarea id="notes" name="notes" placeholder="Запрещённые методы, особые типы задач, формат нумерации"></textarea></div>
    </section>

    <div class="actions"><button class="btn" type="submit">Сформировать промпт</button><button class="btn secondary" type="button" id="resetBtn">Очистить</button></div>
  </form>
  <section class="output-section" id="outputSection" aria-live="polite"><h2>Готовый промпт</h2><pre class="prompt-output" id="outputText"></pre><div class="actions"><button class="btn" id="copyBtn" type="button">Скопировать</button><button class="btn secondary" id="downloadBtn" type="button">Скачать .txt</button></div><p class="status" id="status"></p></section>
</main>
<script>
document.addEventListener('DOMContentLoaded', () => PromptStudio.bind({
  build(form) {
    const v = name => PromptStudio.value(form, name);
    const c = name => PromptStudio.checked(form, name);
    const topics = v('subtopics').split(/\r?\n|,/).map(item => item.trim()).filter(Boolean);
    const total = Math.max(1, Number(v('count'))) * Math.max(1, topics.length || 1);
    return `Ты — опытный преподаватель предмета «${v('subject')}» и составитель проверочных материалов.

Создай набор упражнений по теме «${v('topic')}» для уровня «${v('grade')}».

ПАРАМЕТРЫ
- Подтемы: ${topics.length ? topics.join(', ') : 'определи по общей теме без выхода за её границы'}
- Количество: ${v('count')} на каждую подтему; ориентировочно ${total} задач всего.
- Уровень: ${v('level')}.
- Распределение: ${v('distribution')}.
- Язык: ${v('language')}.

ТРЕБОВАНИЯ К ЗАДАЧАМ
${c('requirements').map((item, i) => `${i + 1}. ${item}.`).join('\n')}
- Каждое условие должно быть самодостаточным и иметь чёткий вопрос.
- Не используй методы и понятия, выходящие за программу уровня «${v('grade')}», если это не указано отдельно.
- Самостоятельно реши каждую задачу до выдачи и исключи вырожденные, неоднозначные или противоречивые случаи.
- При параметрах, дробях, корнях, логарифмах и рациональных выражениях проверь все ограничения и ОДЗ.

ФОРМАТ РЕЗУЛЬТАТА
- Представление: ${v('layout')}.
- Ответы: ${v('answers')}.
- Оформление: ${v('formatting')}.
- Сохрани единообразную нумерацию; число ответов должно точно совпадать с числом задач.
${v('notes') ? `\nДОПОЛНИТЕЛЬНЫЕ УКАЗАНИЯ\n${v('notes')}` : ''}`;
  }
}));
</script>
</body>
</html>
